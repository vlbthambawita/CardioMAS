datasets:
  ptb-xl:
    source_type: physionet
    source_url: https://physionet.org/content/ptb-xl/1.0.3/
    description: >
      PTB-XL — a large publicly available electrocardiography dataset.
      21,799 clinical 12-lead ECGs from 18,869 patients.
    paper_url: https://www.nature.com/articles/s41597-020-0495-6
    num_records: 21799
    ecg_id_field: ecg_id
    sampling_rate: 500
    num_leads: 12
    version: "1.0.3"
    license: CC-BY 4.0

  mimic-iv-ecg:
    source_type: physionet
    source_url: https://physionet.org/content/mimic-iv-ecg/1.0/
    description: >
      MIMIC-IV-ECG — Diagnostic Electrocardiogram Matched Subset.
      Over 800,000 ECGs from the MIMIC-IV clinical database.
    paper_url: https://www.nature.com/articles/s41597-023-02254-7
    ecg_id_field: study_id
    sampling_rate: 500
    num_leads: 12
    version: "1.0"
    license: PhysioNet Credentialed Health Data

  cpsc-2018:
    source_type: url
    source_url: http://2018.icbeb.org/Challenge.html
    description: >
      CPSC 2018 — China Physiological Signal Challenge 2018.
      6,877 12-lead ECG recordings.
    ecg_id_field: record_id
    sampling_rate: 500
    num_leads: 12
    license: Research use

  georgia-12lead:
    source_type: physionet
    source_url: https://physionet.org/content/ecg-arrhythmia/1.0.0/
    description: >
      Georgia 12-Lead ECG Challenge Database. 10,344 recordings.
    ecg_id_field: record_id
    sampling_rate: 500
    num_leads: 12
    license: CC-BY 4.0

  chapman-shaoxing:
    source_type: physionet
    source_url: https://physionet.org/content/ecg-arrhythmia/1.0.0/
    description: >
      Chapman-Shaoxing ECG dataset. 45,152 recordings from Chapman University and
      Shaoxing People's Hospital.
    ecg_id_field: FileName
    sampling_rate: 500
    num_leads: 12
    license: CC-BY 4.0

  code-15:
    source_type: url
    source_url: https://zenodo.org/record/4916206
    description: >
      CODE-15% — a large Brazilian dataset with 2,322,513 12-lead ECG records
      from 1,558,748 patients (15% subset for research).
    ecg_id_field: exam_id
    sampling_rate: 400
    num_leads: 12
    license: CC-BY 4.0
