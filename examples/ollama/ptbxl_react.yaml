system_name: CardioMAS-ReAct
output_dir: runtime_output/react-mode/ptbxl
sources:
  - kind: dataset_dir
    path: /work/vajira/DATA/ptbxl_plus/physionet.org/files/ptb-xl-plus/1.0.1
    label: ptbxl

scripts_dir: runtime_output/scripts/ptbxl-react

retrieval:
  mode: bm25
  top_k: 5
  chunk_size: 700

llm:
  provider: ollama
  base_url: http://localhost:11434
  model: gemma4:latest
  temperature: 0.1
  max_tokens: 900
  code_max_tokens: 4000
  code_temperature: 0.2

agent:
  mode: react                   # ReAct loop instead of linear planner→executor
  max_iterations: 6             # max think-act-observe cycles per sub-query
  query_decomposition: false    # set true to split "A and B?" into two sub-queries
  self_reflection: true         # grade the final answer for hallucination
  retrieval_grading: true       # grade retrieved chunks; loop back if insufficient
  memory_mode: persistent       # reuse answers across sessions (file-backed)
  persistent_memory_max: 200

autonomy:
  enable_code_agents: true
  allow_tool_codegen: true
  dataset_mode: script_only     # route dataset queries to LLM-generated Python scripts
  execute_for_answer: true      # run the script and feed stdout to the responder
  execution_timeout_seconds: 60
  require_approval_for_shell_execution: false
  max_repair_attempts: 2

tools:
  enabled:
    - generate_python_artifact
    - inspect_dataset
    - retrieve_corpus
    - calculate

safety:
  allow_web_fetch: false
  allow_action_tools: true      # needed for script execution
