system_name: CardioMAS
output_dir: ../../runtime_output/ptbxl-ollama
sources:
  - kind: dataset_dir
    path: /work/vajira/DATA/EXG_PTB_XL/physionet/files/ptb-xl/1_0_1
    label: ptb-xl
retrieval:
  mode: hybrid
  top_k: 5
llm:
  provider: ollama
  base_url: http://localhost:11434
  planner_mode: ollama
  model: gemma4:latest
  temperature: 0.1
  max_tokens: 900
embeddings:
  provider: ollama
  base_url: http://localhost:11434
  model: embeddinggemma
  batch_size: 16
tools:
  enabled:
    - retrieve_corpus
    - inspect_dataset
    - calculate
safety:
  allow_web_fetch: false
