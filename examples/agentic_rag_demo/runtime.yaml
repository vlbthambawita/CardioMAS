system_name: CardioMAS
output_dir: output
sources:
  - kind: dataset_dir
    path: data
    label: demo-dataset
  - kind: local_file
    path: notes.md
    label: demo-notes
retrieval:
  mode: hybrid
  top_k: 4
tools:
  enabled:
    - retrieve_corpus
    - inspect_dataset
    - calculate
safety:
  allow_web_fetch: false
